<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="dotGlowIcon" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black rounded square -->
  <rect width="512" height="512" rx="112" fill="#000"/>

  <!-- Incoming voice waves — compact for icon -->
  <path d="M 68 210 Q 50 256 68 302"
        fill="none" stroke="#fff" stroke-width="5"
        stroke-linecap="round" opacity="0.75"/>
  <path d="M 46 188 Q 22 256 46 324"
        fill="none" stroke="#fff" stroke-width="3.5"
        stroke-linecap="round" opacity="0.4"/>

  <!-- Outer ear — scaled for 512 -->
  <path d="
    M 188 72
    C 228 56, 310 56, 358 96
    C 406 136, 420 198, 413 257
    C 406 315, 381 357, 350 384
    C 322 408, 292 422, 272 432
    C 254 440, 236 439, 224 428
    C 210 416, 207 396, 216 378
    C 224 360, 238 349, 244 333
    C 250 316, 243 295, 230 285
    C 215 273, 195 271, 185 255
    C 173 237, 175 210, 185 192
    C 196 174, 215 164, 219 147
    C 223 130, 212 107, 188 100
    Z
  "
  fill="none" stroke="#fff"
  stroke-width="16" stroke-linecap="round"
  stroke-linejoin="round" opacity="0.95"/>

  <!-- Inner ridge -->
  <path d="
    M 226 106
    C 258 96, 314 102, 347 140
    C 377 175, 384 223, 376 267
    C 368 308, 346 340, 322 362
    C 302 380, 278 390, 260 392
  "
  fill="none" stroke="#fff"
  stroke-width="8" stroke-linecap="round" opacity="0.45"/>

  <!-- Canal rings -->
  <ellipse cx="272" cy="252" rx="35" ry="28"
           fill="none" stroke="#fff" stroke-width="3" opacity="0.22"/>
  <ellipse cx="272" cy="252" rx="22" ry="18"
           fill="none" stroke="#fff" stroke-width="2.5" opacity="0.34"/>
  <ellipse cx="272" cy="252" rx="12" ry="9"
           fill="none" stroke="#fff" stroke-width="2.5" opacity="0.5"/>

  <!-- Source dot -->
  <circle cx="272" cy="252" r="8"
          fill="#fff" opacity="0.97"
          filter="url(#dotGlowIcon)"/>

  <!-- Earlobe -->
  <path d="M 224 428 C 212 450 216 466 232 464 C 250 462 260 447 250 432"
        fill="none" stroke="#fff"
        stroke-width="9" stroke-linecap="round" opacity="0.65"/>

</svg>
